    last_login_at DATETIME NULL,
    last_login_ip VARCHAR(64) NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    INDEX idx_admins_role_status (role, status)
) ENGINE=InnoDB;

CREATE TABLE users (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    name VARCHAR(120) NOT NULL,
    email VARCHAR(180) NOT NULL UNIQUE,
    phone VARCHAR(40) NULL,
    password_hash VARCHAR(255) NULL,
    status ENUM('active','suspended','blocked') NOT NULL DEFAULT 'active',
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    INDEX idx_users_status (status)
) ENGINE=InnoDB;

CREATE TABLE events (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    title VARCHAR(180) NOT NULL,
    slug VARCHAR(220) NOT NULL UNIQUE,
    theme VARCHAR(180) NULL,
    description TEXT NOT NULL,
    event_date DATETIME NOT NULL,
    end_date DATETIME NULL,
    venue VARCHAR(220) NOT NULL,
    city VARCHAR(120) NULL,
    flyer VARCHAR(255) NULL,
    capacity INT UNSIGNED DEFAULT 0,
    status ENUM('draft','published','past','cancelled') NOT NULL DEFAULT 'draft',
    created_by BIGINT UNSIGNED NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    FOREIGN KEY (created_by) REFERENCES admins(id) ON DELETE SET NULL,
    INDEX idx_events_date_status (event_date, status),
    FULLTEXT INDEX ft_events_search (title, theme, description, venue)
) ENGINE=InnoDB;

CREATE TABLE event_registrations (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    event_id BIGINT UNSIGNED NOT NULL,
    user_id BIGINT UNSIGNED NULL,
    full_name VARCHAR(140) NOT NULL,
    email VARCHAR(180) NOT NULL,
    phone VARCHAR(40) NULL,
    ministry VARCHAR(150) NULL,
    ticket_code VARCHAR(80) NOT NULL UNIQUE,
    status ENUM('pending','confirmed','checked_in','cancelled') NOT NULL DEFAULT 'confirmed',
    ip_address VARCHAR(64) NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    FOREIGN KEY (event_id) REFERENCES events(id) ON DELETE CASCADE,
    FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE SET NULL,
    INDEX idx_event_registrations_event_status (event_id, status),
    INDEX idx_event_registrations_email (email)
) ENGINE=InnoDB;

CREATE TABLE sermon_categories (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    name VARCHAR(120) NOT NULL UNIQUE,
    slug VARCHAR(150) NOT NULL UNIQUE,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
) ENGINE=InnoDB;

CREATE TABLE sermons (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    category_id BIGINT UNSIGNED NULL,
    title VARCHAR(190) NOT NULL,
    slug VARCHAR(220) NOT NULL UNIQUE,
    speaker VARCHAR(140) NOT NULL,
    sermon_date DATE NOT NULL,
    media_type ENUM('audio','video','youtube') NOT NULL,
    media_url VARCHAR(255) NOT NULL,
    download_url VARCHAR(255) NULL,
    description TEXT NULL,
    downloads INT UNSIGNED DEFAULT 0,
    status ENUM('draft','published') NOT NULL DEFAULT 'published',
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    FOREIGN KEY (category_id) REFERENCES sermon_categories(id) ON DELETE SET NULL,
    INDEX idx_sermons_date_status (sermon_date, status),
    FULLTEXT INDEX ft_sermons_search (title, speaker, description)
) ENGINE=InnoDB;

CREATE TABLE blog_categories (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    name VARCHAR(120) NOT NULL UNIQUE,
    slug VARCHAR(150) NOT NULL UNIQUE,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
) ENGINE=InnoDB;

CREATE TABLE blog_posts (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    category_id BIGINT UNSIGNED NULL,
    admin_id BIGINT UNSIGNED NULL,
    title VARCHAR(220) NOT NULL,
    slug VARCHAR(240) NOT NULL UNIQUE,
    excerpt VARCHAR(320) NULL,
    body MEDIUMTEXT NOT NULL,
    featured_image VARCHAR(255) NULL,
    tags JSON NULL,
    status ENUM('draft','scheduled','published','archived') NOT NULL DEFAULT 'draft',
    published_at DATETIME NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    FOREIGN KEY (category_id) REFERENCES blog_categories(id) ON DELETE SET NULL,
    FOREIGN KEY (admin_id) REFERENCES admins(id) ON DELETE SET NULL,
    INDEX idx_blog_status_published (status, published_at),
    FULLTEXT INDEX ft_blog_search (title, excerpt, body)
) ENGINE=InnoDB;

CREATE TABLE gallery (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    title VARCHAR(160) NOT NULL,
    category VARCHAR(100) NOT NULL,
    media_type ENUM('image','video') NOT NULL DEFAULT 'image',
    file_path VARCHAR(255) NOT NULL,
    thumbnail_path VARCHAR(255) NULL,
    alt_text VARCHAR(180) NULL,
    status ENUM('draft','published') NOT NULL DEFAULT 'published',
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    INDEX idx_gallery_category_status (category, status)
) ENGINE=InnoDB;

CREATE TABLE donations (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    donor_name VARCHAR(140) NOT NULL,
    donor_email VARCHAR(180) NULL,
    amount DECIMAL(12,2) NOT NULL,
    currency CHAR(3) NOT NULL DEFAULT 'NGN',
    method ENUM('bank_transfer','card','cash','ussd','paypal') NOT NULL,
    transaction_ref VARCHAR(120) NULL UNIQUE,
    purpose VARCHAR(160) NULL,
    status ENUM('pending','paid','failed','refunded') NOT NULL DEFAULT 'pending',
    ip_address VARCHAR(64) NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    INDEX idx_donations_status_date (status, created_at),
    INDEX idx_donations_email (donor_email)
) ENGINE=InnoDB;

CREATE TABLE prayer_requests (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    name VARCHAR(140) NOT NULL,
    email VARCHAR(180) NULL,
    request TEXT NOT NULL,
    visibility ENUM('public','private') NOT NULL DEFAULT 'private',
    status ENUM('pending','approved','answered','rejected') NOT NULL DEFAULT 'pending',
    moderated_by BIGINT UNSIGNED NULL,
    ip_address VARCHAR(64) NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    FOREIGN KEY (moderated_by) REFERENCES admins(id) ON DELETE SET NULL,
    INDEX idx_prayers_status_visibility (status, visibility)
) ENGINE=InnoDB;

CREATE TABLE contact_messages (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    name VARCHAR(140) NOT NULL,
    email VARCHAR(180) NOT NULL,
    phone VARCHAR(40) NULL,
    subject VARCHAR(180) NOT NULL,
    message TEXT NOT NULL,
    status ENUM('new','read','replied','archived') NOT NULL DEFAULT 'new',
    replied_by BIGINT UNSIGNED NULL,
    ip_address VARCHAR(64) NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    FOREIGN KEY (replied_by) REFERENCES admins(id) ON DELETE SET NULL,
    INDEX idx_contact_status_date (status, created_at)
) ENGINE=InnoDB;

CREATE TABLE subscribers (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    email VARCHAR(180) NOT NULL UNIQUE,
    name VARCHAR(120) NULL,
    status ENUM('active','unsubscribed','bounced') NOT NULL DEFAULT 'active',
    confirmation_token VARCHAR(120) NULL,
    subscribed_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    INDEX idx_subscribers_status (status)
) ENGINE=InnoDB;

CREATE TABLE settings (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    setting_key VARCHAR(120) NOT NULL UNIQUE,
    setting_value LONGTEXT NULL,
    is_json TINYINT(1) NOT NULL DEFAULT 0,
    updated_by BIGINT UNSIGNED NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
    FOREIGN KEY (updated_by) REFERENCES admins(id) ON DELETE SET NULL
) ENGINE=InnoDB;

CREATE TABLE activity_logs (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    admin_id BIGINT UNSIGNED NULL,
    action VARCHAR(160) NOT NULL,
    module VARCHAR(80) NOT NULL,
    ip_address VARCHAR(64) NULL,
    user_agent VARCHAR(255) NULL,
    metadata JSON NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    FOREIGN KEY (admin_id) REFERENCES admins(id) ON DELETE SET NULL,
    INDEX idx_activity_admin_date (admin_id, created_at),
    INDEX idx_activity_module (module)
) ENGINE=InnoDB;

CREATE TABLE notifications (
    id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
    admin_id BIGINT UNSIGNED NULL,
    title VARCHAR(160) NOT NULL,
    body VARCHAR(320) NOT NULL,
    type ENUM('info','success','warning','danger') NOT NULL DEFAULT 'info',
    read_at DATETIME NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    FOREIGN KEY (admin_id) REFERENCES admins(id) ON DELETE CASCADE,
    INDEX idx_notifications_admin_read (admin_id, read_at)
) ENGINE=InnoDB;

            function createToken() {
                if (!window.crypto?.getRandomValues) return `${Date.now().toString(36)}${Math.random().toString(36).slice(2)}`;
                const array = new Uint8Array(24);
                crypto.getRandomValues(array);
                return Array.from(array, b => b.toString(16).padStart(2, '0')).join('');
            }

            function escapeHtml(value) {
                return String(value ?? '').replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
            }

            function stripTags(value) {
                return String(value || '').replace(/<[^>]*>/g, '');
            }

            function formatDate(value, options = {}) {
                return new Intl.DateTimeFormat('en-NG', { month: 'short', day: 'numeric', year: 'numeric', ...options }).format(new Date(value));
            }

            function formatMoney(amount, currency = 'NGN') {
                return new Intl.NumberFormat('en-NG', { style: 'currency', currency, maximumFractionDigits: 0 }).format(Number(amount || 0));
            }

            function uid(prefix) {
                return `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 7)}`;
            }

            async function sha256(input) {
                if (!crypto.subtle) {
                    let hash = 0;
                    for (let index = 0; index < input.length; index++) hash = ((hash << 5) - hash) + input.charCodeAt(index) | 0;
                    return `fallback_${Math.abs(hash)}`;
                }
                const encoded = new TextEncoder().encode(input);
                const hash = await crypto.subtle.digest('SHA-256', encoded);
                return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
            }

                const stored = localStorage.getItem(storageKey);
                if (!stored) {
                    const seeded = seedData();
                    localStorage.setItem(storageKey, JSON.stringify(seeded));
                    return seeded;
                }
                try { return JSON.parse(stored); } catch (error) { return seedData(); }
            }

                localStorage.setItem(storageKey, JSON.stringify(app.data));
            }

            }

                document.getElementById('toastHost').insertAdjacentHTML('beforeend', html);

            function startCountdowns() {
                updateCountdowns();
                clearInterval(window.tpCountdownInterval);
                window.tpCountdownInterval = setInterval(updateCountdowns, 1000);
            }

            function updateCountdowns() {
                const target = new Date(app.data.settings.nextEventDate).getTime();
                const diff = Math.max(0, target - Date.now());
                const days = Math.floor(diff / 86400000);
                const hours = Math.floor((diff % 86400000) / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                const html = [['Days', days], ['Hours', hours], ['Minutes', minutes], ['Seconds', seconds]].map(([label, value]) => `<div class="countdown-unit"><strong>${String(value).padStart(label === 'Days' ? 3 : 2, '0')}</strong><span>${label}</span></div>`).join('');
                ['homeCountdown','eventsCountdown','liveCountdown'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = html; });
            }

            function animateCounters() {
                document.querySelectorAll('.counter').forEach(counter => {
                    const target = Number(counter.dataset.count || 0);
                    const duration = 1300;
                    const start = performance.now();
                    function tick(now) {
                        const progress = Math.min((now - start) / duration, 1);
                        counter.textContent = Math.floor(target * progress).toLocaleString('en-NG');
                        if (progress < 1) requestAnimationFrame(tick);
                    }
                    requestAnimationFrame(tick);
                });
            }

            function revealOnScroll() {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('show'); });
                }, { threshold: .13 });
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }

            async function handleNewsletter(event) {
                event.preventDefault();
                const form = event.currentTarget;
                if (!validateCsrf(form)) return toast('Security token expired. Refresh and try again.', 'danger');
                const email = form.email.value.trim().toLowerCase();
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return toast('Enter a valid email address.', 'warning');
                if (app.data.subscribers.some(s => s.email === email)) return toast('You are already subscribed.', 'warning');
                await fakeFetch({ email });
                app.data.subscribers.unshift({ id: uid('sub'), name: '', email, status: 'active', subscribedAt: new Date().toISOString().slice(0,10) });
                addLog(`Newsletter subscriber added: ${email}`, 'Newsletter');
                saveData();
                form.reset();
                toast('Subscription successful. Confirmation email queued.');
            }

            async function handleContact(event) {
                event.preventDefault();
                const form = event.currentTarget;
                if (!validateCsrf(form)) return toast('Security token expired. Refresh and try again.', 'danger');
                await fakeFetch({ status: 'queued' });
                app.data.contactMessages.unshift({ id: uid('msg'), name: secureText(form.name.value, 140), email: secureText(form.email.value, 180), phone: secureText(form.phone.value, 40), subject: secureText(form.subject.value, 180), message: secureText(form.message.value, 2500), status: 'new', createdAt: new Date().toISOString().slice(0,10) });

                form.reset();
                Swal.fire('Message Sent', 'The ministry office has received your message.', 'success');
            }

            async function handleDonation(event) {

            function getSession() {
                try {
                    const session = JSON.parse(localStorage.getItem(authKey) || sessionStorage.getItem(authKey) || 'null');
                    if (!session || session.expiresAt < Date.now()) { localStorage.removeItem(authKey); sessionStorage.removeItem(authKey); return null; }
                    return session;
                } catch (error) { return null; }
            }

            function renderLogin() {
                document.getElementById('adminRoot').innerHTML = `<section class="admin-login"><div class="glass rounded-5 p-4 p-md-5" style="max-width:980px;width:100%"><div class="row g-5 align-items-center"><div class="col-lg-6"><div class="brand-mark mb-4"><i class="fa-solid fa-music"></i></div><h1 class="display-5 fw-black">Secure Ministry Command Center</h1><p class="text-white-50 fs-5">Role-based access, hashed passwords, session timeout, rate-limited login, audit trail, and CSRF tokens are modeled in this single-page build.</p><div class="bg-dark bg-opacity-25 rounded-4 p-3 small"><strong>Demo access:</strong><br>superadmin / admin123<br>editor / editor123</div></div><div class="col-lg-6"><form class="bg-white text-dark rounded-4 p-4" id="loginForm">${csrfInput()}<h3 class="fw-black mb-3">Admin Login</h3><div class="mb-3"><label class="form-label">Username</label><input class="form-control form-control-lg" name="username" autocomplete="username" required></div><div class="mb-3"><label class="form-label">Password</label><input class="form-control form-control-lg" name="password" type="password" autocomplete="current-password" required></div><div class="d-flex justify-content-between align-items-center mb-4"><div class="form-check"><input class="form-check-input" type="checkbox" name="remember" id="remember"><label class="form-check-label" for="remember">Remember me</label></div><button class="btn btn-link p-0" type="button" id="forgotPassword">Forgot password?</button></div><button class="btn btn-royal btn-lg w-100" type="submit"><span class="login-label">Sign In</span><span class="spinner-border spinner-border-sm d-none ms-2"></span></button></form></div></div></div></section>`;
                document.getElementById('loginForm').addEventListener('submit', handleLogin);
                document.getElementById('forgotPassword').addEventListener('click', () => Swal.fire('Password Reset', 'Enter your admin email. In production PHPMailer sends a signed reset link.', 'info'));
            }

            async function handleLogin(event) {
                event.preventDefault();
                const form = event.currentTarget;
                if (!validateCsrf(form)) return toast('Security token expired.', 'danger');
                const rate = JSON.parse(localStorage.getItem(rateKey) || '{"attempts":0,"lockedUntil":0}');
                if (rate.lockedUntil > Date.now()) return toast('Too many attempts. Try again later.', 'danger');
                form.querySelector('.login-label').textContent = 'Checking';
                form.querySelector('.spinner-border').classList.remove('d-none');
                await fakeFetch({ auth: true }, 550);
                const username = form.username.value.trim();
                const passwordHash = await sha256(form.password.value);
                const admin = app.data.admins.find(a => a.username === username && a.passwordHash === passwordHash && a.status === 'active');
                if (!admin) {
                    rate.attempts += 1;
                    if (rate.attempts >= 5) rate.lockedUntil = Date.now() + 10 * 60 * 1000;
                    localStorage.setItem(rateKey, JSON.stringify(rate));
                    form.querySelector('.login-label').textContent = 'Sign In';
                    form.querySelector('.spinner-border').classList.add('d-none');
                    return toast('Invalid credentials or inactive account.', 'danger');
                }
                localStorage.removeItem(rateKey);
                admin.lastLoginAt = new Date().toISOString();
                app.currentAdmin = admin;
                const session = { adminId: admin.id, csrf: app.csrfToken, expiresAt: Date.now() + (form.remember.checked ? 7 * 86400000 : 30 * 60000) };
                (form.remember.checked ? localStorage : sessionStorage).setItem(authKey, JSON.stringify(session));
                addLog('Admin signed in', 'Authentication');
                saveData();
                location.hash = '#admin/dashboard';
                renderAdmin('dashboard');
            }

            function logout() {
                localStorage.removeItem(authKey);
                sessionStorage.removeItem(authKey);

                location.hash = '#home';
            }

-half-stroke"></i></button><button class="btn btn-gold" onclick="TP.logout()"><i class="fa-solid fa-right-from-bracket me-1"></i>Logout</button></div></div></header><div class="p-3 p-lg-4" id="adminContent"></div></main></section>`;

            function fieldValue(item, field) {
                const value = item[field];
                if (field === 'amount') return formatMoney(value, item.currency || 'NGN');

                if (field === 'status') return `<span class="badge text-bg-${statusColor(value)}"><span class="status-dot bg-light"></span>${escapeHtml(value)}</span>`;
                if (field === 'downloads') return Number(value || 0).toLocaleString('en-NG');

            function label(value) {
                return value.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase());

            function statusColor(status) {
                return ['paid','published','active','approved','answered','confirmed'].includes(status) ? 'success' : ['pending','scheduled','new','draft'].includes(status) ? 'warning' : ['blocked','suspended','failed','rejected'].includes(status) ? 'danger' : 'secondary';

            function initDataTables() {

                    document.querySelectorAll('.datatable').forEach(table => {
                        if ($.fn.dataTable.isDataTable(table)) $(table).DataTable().destroy();
                        $(table).DataTable({ pageLength: 8, responsive: true, order: [], language: { search: 'Search records:' } });
                    });
                }, 0);
            }

            function openEntityModal(entity, id = null) {
                const cfg = entityConfig[entity];
                const item = id ? app.data[cfg.collection].find(row => row.id === id) : {};
                const fields = entityFormFields(entity, item || {});
                modal(`<div class="modal-header"><h4 class="modal-title fw-black">${id ? 'Edit' : 'Create'} ${cfg.singular}</h4><button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button></div><form id="entityForm" data-entity="${entity}" data-id="${id || ''}"><div class="modal-body">${csrfInput()}<div class="row g-3">${fields}</div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Cancel</button><button class="btn btn-royal" type="submit">Save ${cfg.singular}</button></div></form>`);
                if (entity === 'blogPosts' && window.tinymce) {
                    const oldEditor = tinymce.get('blogBodyEditor');
                    if (oldEditor) oldEditor.remove();
                    setTimeout(() => tinymce.init({ selector: '#blogBodyEditor', height: 260, menubar: false, plugins: 'lists link table code', toolbar: 'undo redo | blocks | bold italic | bullist numlist | link | code' }), 100);
                }
                document.getElementById('entityForm').addEventListener('submit', saveEntity);
                const fileInput = document.querySelector('#entityForm input[type="file"]');
                if (fileInput) fileInput.addEventListener('change', () => { const result = validateUpload(fileInput.files[0]); if (!result.ok) { toast(result.message, 'warning'); fileInput.value = ''; } });
            }

            function entityFormFields(entity, item) {
                const input = (name, labelText, type = 'text', value = '') => `<div class="col-md-6"><label class="form-label">${labelText}</label><input class="form-control" name="${name}" type="${type}" value="${escapeHtml(value)}"></div>`;
                const area = (name, labelText, value = '', id = '') => `<div class="col-12"><label class="form-label">${labelText}</label><textarea class="form-control" ${id ? `id="${id}"` : ''} name="${name}" rows="4">${escapeHtml(value)}</textarea></div>`;
                const select = (name, labelText, options, value = '') => `<div class="col-md-6"><label class="form-label">${labelText}</label><select class="form-select" name="${name}">${options.map(o => `<option value="${escapeHtml(o)}" ${o === value ? 'selected' : ''}>${escapeHtml(label(o))}</option>`).join('')}</select></div>`;
                if (entity === 'events') return input('title','Title','text', item.title) + input('date','Date','datetime-local', item.date ? new Date(item.date).toISOString().slice(0,16) : '') + input('location','Location','text', item.location) + input('category','Category','text', item.category) + select('status','Status',['draft','published','past','cancelled'], item.status || 'published') + input('capacity','Capacity','number', item.capacity || 0) + input('flyer','Flyer URL','url', item.flyer) + area('description','Description', item.description);
                if (entity === 'sermons') return input('title','Title','text', item.title) + input('speaker','Speaker','text', item.speaker) + select('category','Category', app.data.sermonCategories, item.category || 'Worship') + select('type','Type',['audio','video','youtube'], item.type || 'video') + input('date','Date','date', item.date) + input('mediaUrl','Media URL','url', item.mediaUrl) + input('downloadUrl','Download URL','url', item.downloadUrl || '#') + input('downloads','Downloads','number', item.downloads || 0) + select('status','Status',['draft','published'], item.status || 'published') + area('description','Description', item.description);
                if (entity === 'blogPosts') return input('title','Title','text', item.title) + select('category','Category', app.data.blogCategories, item.category || 'Event Update') + input('tags','Tags comma separated','text', (item.tags || []).join(', ')) + select('status','Status',['draft','scheduled','published','archived'], item.status || 'draft') + input('publishDate','Publish Date','date', item.publishDate || new Date().toISOString().slice(0,10)) + input('image','Featured Image URL','url', item.image) + area('excerpt','Excerpt', item.excerpt) + area('body','Body', item.body, 'blogBodyEditor');
                if (entity === 'gallery') return input('title','Title','text', item.title) + input('category','Category','text', item.category) + select('type','Type',['image','video'], item.type || 'image') + select('status','Status',['draft','published'], item.status || 'published') + input('url','Media URL','url', item.url) + `<div class="col-12"><label class="form-label">Secure Upload Placeholder</label><input class="form-control" type="file" accept="image/*,video/*"></div>`;
                if (entity === 'users') return input('name','Name','text', item.name) + input('email','Email','email', item.email) + input('phone','Phone','text', item.phone) + input('role','Role','text', item.role || 'member') + select('status','Status',['active','suspended','blocked'], item.status || 'active');
                if (entity === 'donations') return input('donorName','Donor Name','text', item.donorName) + input('donorEmail','Donor Email','email', item.donorEmail) + input('amount','Amount','number', item.amount || 0) + select('method','Method',['bank_transfer','card','cash','ussd','paypal'], item.method || 'bank_transfer') + select('status','Status',['pending','paid','failed','refunded'], item.status || 'pending') + input('purpose','Purpose','text', item.purpose || 'General Giving');
                if (entity === 'contactMessages') return input('name','Name','text', item.name) + input('email','Email','email', item.email) + input('subject','Subject','text', item.subject) + select('status','Status',['new','read','replied','archived'], item.status || 'read') + area('message','Message', item.message) + area('reply','Reply Email Draft', 'Thank you for contacting Team Praise.');
                if (entity === 'prayerRequests') return input('name','Name','text', item.name) + input('email','Email','email', item.email) + select('visibility','Visibility',['public','private'], item.visibility || 'private') + select('status','Status',['pending','approved','answered','rejected'], item.status || 'pending') + area('request','Request', item.request);
                if (entity === 'subscribers') return input('name','Name','text', item.name) + input('email','Email','email', item.email) + select('status','Status',['active','unsubscribed','bounced'], item.status || 'active');
                return '';
            }

            async function saveEntity(event) {
                event.preventDefault();
                const form = event.currentTarget;
                if (!validateCsrf(form)) return toast('Security token expired.', 'danger');
                const entity = form.dataset.entity;
                const id = form.dataset.id;
                const cfg = entityConfig[entity];
                const formData = new FormData(form);
                const payload = {};
                formData.forEach((value, key) => { if (key !== 'csrf_token') payload[key] = typeof value === 'string' ? value.trim() : value; });
                if (window.tinymce && tinymce.get('blogBodyEditor')) payload.body = tinymce.get('blogBodyEditor').getContent();
                normalizePayload(entity, payload);
                await fakeFetch({ saved: true });
                if (id) {
                    const index = app.data[cfg.collection].findIndex(row => row.id === id);
                    app.data[cfg.collection][index] = { ...app.data[cfg.collection][index], ...payload };
                    addLog(`${cfg.singular} updated`, cfg.title);
                } else {
                    app.data[cfg.collection].unshift({ id: uid(entity.slice(0, 4)), ...payload });
                    addLog(`${cfg.singular} created`, cfg.title);
                }
                saveData();
                bootstrap.Modal.getInstance(document.getElementById('globalModal')).hide();
                toast(`${cfg.singular} saved.`);
                renderAdminSection(entitySectionMap[entity] || entity);
            }

            function normalizePayload(entity, payload) {
                Object.keys(payload).forEach(key => { if (typeof payload[key] === 'string' && key !== 'body') payload[key] = secureText(payload[key], 5000); });
                if (entity === 'events') { payload.slug = (payload.title || 'event').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); payload.capacity = Number(payload.capacity || 0); payload.theme = payload.category; }
                if (entity === 'sermons') { payload.downloads = Number(payload.downloads || 0); }
                if (entity === 'blogPosts') { payload.tags = (payload.tags || '').split(',').map(t => secureText(t.trim(), 40)).filter(Boolean); payload.body = payload.body || ''; }
                if (entity === 'donations') { payload.amount = Number(payload.amount || 0); payload.currency = 'NGN'; payload.date = new Date().toISOString().slice(0,10); }
                if (entity === 'subscribers') { payload.subscribedAt = payload.subscribedAt || new Date().toISOString().slice(0,10); }
                if (entity === 'prayerRequests') { payload.createdAt = payload.createdAt || new Date().toISOString().slice(0,10); }
                if (entity === 'contactMessages') { payload.createdAt = payload.createdAt || new Date().toISOString().slice(0,10); }
            }

            async function deleteEntity(entity, id) {
                const cfg = entityConfig[entity];
                const result = await Swal.fire({ title: `Delete ${cfg.singular}?`, text: 'This action is recorded in the audit trail.', icon: 'warning', showCancelButton: true, confirmButtonText: 'Delete' });
                if (!result.isConfirmed) return;
                app.data[cfg.collection] = app.data[cfg.collection].filter(row => row.id !== id);
                addLog(`${cfg.singular} deleted`, cfg.title);
                saveData();
                toast(`${cfg.singular} deleted.`);
                renderAdminSection(entitySectionMap[entity] || entity);
            }

            function exportCsv(entity) {
                const data = entity === 'activityLogs' ? app.data.activityLogs : app.data[entityConfig[entity]?.collection || entity] || [];
                if (!data.length) return toast('No records to export.', 'warning');
                const headers = Object.keys(data[0]);
                const rows = [headers.join(','), ...data.map(row => headers.map(h => `"${String(Array.isArray(row[h]) ? row[h].join('|') : row[h] ?? '').replace(/"/g, '""')}"`).join(','))];
                downloadText(`${entity}.csv`, rows.join('\n'));
                addLog(`Exported ${entity}`, 'Exports');
            }

            function adminSettings() {
                const s = app.data.settings;
                return `<div class="row g-4"><div class="col-xl-7"><div class="card-premium p-4"><h5 class="fw-black mb-3">Site, SMTP, SEO, Maintenance</h5><form id="settingsForm">${csrfInput()}<div class="row g-3"><div class="col-md-6"><label class="form-label">Contact Email</label><input class="form-control" name="contactEmail" value="${escapeHtml(s.contactEmail)}"></div><div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" name="phone" value="${escapeHtml(s.phone)}"></div><div class="col-12"><label class="form-label">Address</label><input class="form-control" name="address" value="${escapeHtml(s.address)}"></div><div class="col-md-6"><label class="form-label">SMTP Host</label><input class="form-control" name="smtpHost" value="${escapeHtml(s.smtpHost)}"></div><div class="col-md-6"><label class="form-label">SEO Title</label><input class="form-control" name="seoTitle" value="${escapeHtml(s.seoTitle)}"></div><div class="col-12"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="maintenanceMode" ${s.maintenanceMode ? 'checked' : ''}><label class="form-check-label">Maintenance mode</label></div></div><div class="col-12"><button class="btn btn-royal" type="submit">Save Settings</button><button class="btn btn-outline-primary ms-2" type="button" id="testEmail">Send Test Email</button></div></div></form></div></div><div class="col-xl-5"><div class="card-premium p-4"><h5 class="fw-black">Advanced Placeholders</h5><div class="d-grid gap-3"><div><strong>Logo Upload</strong><br><small class="text-muted">PNG/SVG validation and CDN path storage.</small></div><div><strong>Favicon Upload</strong><br><small class="text-muted">ICO/PNG validation with cache busting.</small></div><div><strong>Caching</strong><br><small class="text-muted">File cache, OPcache, and browser cache headers.</small></div><div><strong>PWA</strong><br><small class="text-muted">Manifest and service worker download in Developer Center.</small></div></div></div></div></div>`;
            }

            function attachSettingsHandlers() {
                document.getElementById('settingsForm').addEventListener('submit', async event => {
                    event.preventDefault();
                    const form = event.currentTarget;
                    if (!validateCsrf(form)) return toast('Security token expired.', 'danger');
                    await fakeFetch({ saved: true });
                    ['contactEmail','phone','address','smtpHost','seoTitle'].forEach(key => app.data.settings[key] = secureText(form[key].value, 220));
                    app.data.settings.maintenanceMode = form.maintenanceMode.checked;
                    addLog('Site settings updated', 'Settings');
                    saveData();
                    toast('Settings saved.');
                });
                document.getElementById('testEmail').addEventListener('click', () => Swal.fire('SMTP Test Queued', 'Production PHPMailer service would send a signed test email using SMTP settings.', 'success'));
            }

            function adminDeveloper() {
                return `<div class="row g-4"><div class="col-12"><div class="card-premium p-4"><div class="d-flex flex-wrap justify-content-between gap-3 align-items-center"><div><h4 class="fw-black mb-1">Production Architecture Center</h4><p class="text-muted mb-0">PHP 8 MVC, MySQL schema, REST API contracts, security controls, cPanel/VPS deployment, and downloadable assets.</p></div><div class="d-flex flex-wrap gap-2"><button class="btn btn-outline-primary" onclick="TP.downloadText('database-schema.sql', SQL_SCHEMA)">Download SQL</button><button class="btn btn-outline-primary" onclick="TP.downloadText('.htaccess', HTACCESS)">Download .htaccess</button><button class="btn btn-outline-primary" onclick="TP.downloadText('.env.example', ENV_SAMPLE)">Download .env</button><button class="btn btn-outline-primary" onclick="TP.downloadText('manifest.webmanifest', PWA_MANIFEST)">PWA Manifest</button><button class="btn btn-outline-primary" onclick="TP.downloadText('service-worker.js', SERVICE_WORKER)">Service Worker</button><button class="btn btn-gold" onclick="TP.generateSitemap()">Generate Sitemap</button></div></div></div></div><div class="col-xl-5"><div class="card-premium p-4"><h5 class="fw-black">Clean Folder Structure</h5><pre class="code-block" id="treeBlock"></pre></div><div class="card-premium p-4 mt-4"><h5 class="fw-black">REST API Endpoints</h5><div class="table-responsive"><table class="table table-sm"><thead><tr><th>Method</th><th>Endpoint</th><th>Purpose</th></tr></thead><tbody>${apiRows()}</tbody></table></div></div></div><div class="col-xl-7"><div class="card-premium p-4"><h5 class="fw-black">MySQL Schema</h5><pre class="code-block" id="schemaBlock"></pre></div></div><div class="col-xl-6"><div class="card-premium p-4"><h5 class="fw-black">.htaccess</h5><pre class="code-block" id="htaccessBlock"></pre></div></div><div class="col-xl-6"><div class="card-premium p-4"><h5 class="fw-black">Environment Configuration</h5><pre class="code-block" id="envBlock"></pre></div></div><div class="col-xl-6"><div class="card-premium p-4"><h5 class="fw-black">Installation Guide</h5><pre class="code-block" id="installBlock"></pre></div></div><div class="col-xl-6"><div class="card-premium p-4"><h5 class="fw-black">Security Implementation Map</h5><ul class="list-group list-group-flush"><li class="list-group-item">CSRF tokens on every mutating form and AJAX-style request.</li><li class="list-group-item">Prepared statement architecture through PDO model layer.</li><li class="list-group-item">HTML output encoding, input validation, and rich text sanitization.</li><li class="list-group-item">Secure upload validation by MIME, extension, size, and random filenames.</li><li class="list-group-item">Password hashing with password_hash(), role checks, session timeout, and remember tokens.</li><li class="list-group-item">Login rate limiting, IP logging, admin audit trail, and activity logs.</li><li class="list-group-item">PHPMailer SMTP for password reset, contact replies, newsletters, event confirmations, and admin alerts.</li></ul></div></div></div>`;
            }

            function apiRows() {
                return [
                    ['POST','/api/v1/auth/login','Issue secure session token'], ['POST','/api/v1/auth/logout','Revoke token'], ['GET','/api/v1/events','List events'], ['POST','/api/v1/events','Create event'], ['PUT','/api/v1/events/{id}','Update event'], ['DELETE','/api/v1/events/{id}','Delete event'], ['POST','/api/v1/events/{id}/register','Register attendee'], ['GET','/api/v1/sermons','List sermons'], ['GET','/api/v1/blog-posts','List blog posts'], ['POST','/api/v1/donations','Create donation intent'], ['POST','/api/v1/prayer-requests','Submit prayer request']
                ].map(row => `<tr><td><span class="badge text-bg-primary">${row[0]}</span></td><td><code>${row[1]}</code></td><td>${row[2]}</td></tr>`).join('');
            }

            function hydrateDeveloperDocs() {
                window.SQL_SCHEMA = SQL_SCHEMA;
                window.HTACCESS = HTACCESS;
                window.ENV_SAMPLE = ENV_SAMPLE;
                window.PWA_MANIFEST = PWA_MANIFEST;
                window.SERVICE_WORKER = SERVICE_WORKER;
                document.getElementById('treeBlock').textContent = PROJECT_TREE;
                document.getElementById('schemaBlock').textContent = SQL_SCHEMA;
                document.getElementById('htaccessBlock').textContent = HTACCESS;
                document.getElementById('envBlock').textContent = ENV_SAMPLE;
                document.getElementById('installBlock').textContent = INSTALL_GUIDE;
            }

            function downloadText(filename, content) {
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);
            }

            function generateSitemap() {
                const base = location.origin + location.pathname.replace(/index\.html$/, '');
                const urls = pages.map(page => `  <url><loc>${base}#${page}</loc><changefreq>weekly</changefreq><priority>${page === 'home' ? '1.0' : '0.8'}</priority></url>`).join('\n');
                const xml = `<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n${urls}\n</urlset>`;
                downloadText('sitemap.xml', xml);
                toast('Sitemap generated.');
            }

            function rotateHero() {
                let index = 0;
                setInterval(() => {
                    index = (index + 1) % heroImages.length;
                    document.documentElement.style.setProperty('--hero-image', heroImages[index]);
                }, 6500);
            }

            function bindGlobalEvents() {
                document.addEventListener('click', event => {
                    const pageLink = event.target.closest('[data-page]');
                    if (pageLink) {
                        event.preventDefault();
                        location.hash = pageLink.dataset.page;
                        const menu = bootstrap.Collapse.getInstance(document.getElementById('publicMenu'));
                        if (menu) menu.hide();
                    }
                });
                document.getElementById('themeTogglePublic').addEventListener('click', toggleTheme);
                window.addEventListener('hashchange', navigateFromHash);
                window.addEventListener('scroll', () => document.getElementById('publicNav').classList.toggle('scrolled', window.scrollY > 24));
                setInterval(() => {
                    if (!app.currentAdmin) return;
                    const note = { id: uid('not'), title: 'Realtime ministry update', body: 'New visitor analytics and registrations synced.', type: 'info', read: false, createdAt: new Date().toISOString() };
                    app.data.notifications.unshift(note);
                    app.data.notifications = app.data.notifications.slice(0, 25);
                    saveData();
                    toast('Realtime notification received.', 'warning');
                    if (location.hash.startsWith('#admin')) renderAdminShell(), renderAdminSection(app.adminSection);
                }, 30000);
            }

            async function init() {
                app.data = loadData();
                await ensureAdminHashes();
                Object.assign(window, { SQL_SCHEMA, HTACCESS, ENV_SAMPLE, PWA_MANIFEST, SERVICE_WORKER });
                setTheme(localStorage.getItem('tp_theme') || 'light');
                bindGlobalEvents();
                rotateHero();
                navigateFromHash();
                setTimeout(() => document.getElementById('loader').classList.add('hidden'), 450);
            }

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>
